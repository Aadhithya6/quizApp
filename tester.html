<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp API Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #8b5cf6;
            --accent: #d946ef;
            --text: #f8fafc;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                radial-gradient(circle at bottom left, #312e81, transparent);
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:active {
            transform: translateY(0);
        }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            min-height: 20px;
            word-break: break-all;
            display: none;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            display: block !important;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            display: block !important;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>API Connection Check</h1>
        <p>Test your Railway deployment from this local page.</p>

        <div class="input-group">
            <label>API Root URL</label>
            <input type="text" id="apiUrl" value="https://quizapp-production-786c.up.railway.app/"
                placeholder="https://your-app.up.railway.app/">
        </div>

        <button onclick="testConnection()">
            <span id="btnText">Test Connection</span>
            <div class="loader" id="loader"></div>
        </button>

        <div id="result"></div>
    </div>

    <script>
        async function testConnection() {
            const urlInput = document.getElementById('apiUrl');
            const resultDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');

            let url = urlInput.value.trim();
            if (!url.startsWith('http')) url = 'https://' + url;

            // Reset UI
            resultDiv.className = '';
            resultDiv.style.display = 'none';
            loader.style.display = 'inline-block';
            btnText.style.display = 'none';

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    const data = await response.json();
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<strong>Connected!</strong> Status: ${response.status}<br><br>API Response: <pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.className = 'error';
                    const errorText = await response.text().catch(() => 'No response body');
                    resultDiv.innerHTML = `<strong>API Responded with Error</strong> Status: ${response.status}<br><br>${errorText.substring(0, 200)}...`;
                }
            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<strong>CORS or Network Error</strong><br><br>${err.message}<br><br>Ensure this origin is in your Railway CORS_ALLOWED_ORIGINS.`;
            } finally {
                loader.style.display = 'none';
                btnText.style.display = 'inline-block';
            }
        }
    </script>
</body>

</html>
