<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp API Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #8b5cf6;
            --accent: #d946ef;
            --text: #f8fafc;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                radial-gradient(circle at bottom left, #312e81, transparent);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:active {
            transform: translateY(0);
        }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            min-height: 20px;
            word-break: break-all;
            display: none;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            display: block !important;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            display: block !important;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>API Connection Check</h1>
        <p>Test your Railway deployment from this local page.</p>

        <div class="input-group">
            <label>API Base URL</label>
            <input type="text" id="apiUrl" value="https://quizapp-production-786c.up.railway.app"
                placeholder="https://your-app.up.railway.app">
        </div>

        <div class="input-group">
            <label>API Endpoint & Method</label>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <select id="apiMethod" onchange="toggleBody()"
                    style="background: #334155; border: 1px solid #475569; border-radius: 12px; color: white; padding: 0 12px; font-weight: 600;">
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="PATCH">PATCH</option>
                    <option value="DELETE">DELETE</option>
                </select>
                <input type="text" id="apiEndpoint" value="/" placeholder="/api/v1/..." style="flex-grow: 1;">
            </div>
            <select id="endpointPicker" onchange="updateEndpoint(this.value)"
                style="width: 100%; background: #334155; border: 1px solid #475569; border-radius: 12px; color: white; padding: 10px; font-size: 0.85rem;">
                <option value="GET|/">Root (/) </option>
                <option value="GET|/api/v1/health/">Health Check </option>
                <option value="POST|/api/v1/auth/register/|{&quot;username&quot;:&quot;testuser&quot;,&quot;password&quot;:&quot;Pass123!&quot;,&quot;email&quot;:&quot;test@example.com&quot;}">Auth - Register </option>
                <option value="POST|/api/v1/auth/login/|{&quot;username&quot;:&quot;testuser&quot;,&quot;password&quot;:&quot;Pass123!&quot;}">Auth - Login </option>
                <option value="GET|/api/v1/quizzes/">Quizzes </option>
                <option value="GET|/api/v1/users/me/">My Profile (Auth req)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Bearer Token (Authorization)</label>
            <input type="text" id="authToken" placeholder="Paste JWT token here..." style="font-size: 0.8rem;">
            <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 0.8rem; color: #94a3b8;">
                <input type="checkbox" id="autoStore" style="width: auto;" checked>
                <span>Auto-update token from login response</span>
            </div>
        </div>

        <div class="input-group" id="bodyGroup" style="display: none;">
            <label>Request Body (JSON)</label>
            <textarea id="apiBody" 
                style="width: 100%; height: 120px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 12px; color: #10b981; font-family: monospace; padding: 12px; box-sizing: border-box; resize: vertical;"
                placeholder='{"key": "value"}'></textarea>
        </div>

        <button onclick="testConnection()">
            <span id="btnText">Test Endpoint</span>
            <div class="loader" id="loader"></div>
        </button>

        <div id="result"></div>
    </div>

    <script>
        function toggleBody() {
            const method = document.getElementById('apiMethod').value;
            document.getElementById('bodyGroup').style.display = method === 'GET' ? 'none' : 'block';
        }

        function updateEndpoint(val) {
            const [method, path, body] = val.split('|');
            document.getElementById('apiMethod').value = method;
            document.getElementById('apiEndpoint').value = path;
            if (body) document.getElementById('apiBody').value = JSON.stringify(JSON.parse(body), null, 2);
            toggleBody();
        }

        async function testConnection() {
            const urlBaseInput = document.getElementById('apiUrl');
            const endpointInput = document.getElementById('apiEndpoint');
            const methodInput = document.getElementById('apiMethod');
            const bodyInput = document.getElementById('apiBody');
            const tokenInput = document.getElementById('authToken');
            const autoStore = document.getElementById('autoStore');

            const resultDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');

            let baseUrl = urlBaseInput.value.trim();
            if (!baseUrl.startsWith('http')) baseUrl = 'https://' + baseUrl;
            if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);

            let endpoint = endpointInput.value.trim();
            if (!endpoint.startsWith('/')) endpoint = '/' + endpoint;

            const fullUrl = baseUrl + endpoint;
            const method = methodInput.value;

            // Reset UI
            resultDiv.className = '';
            resultDiv.style.display = 'none';
            loader.style.display = 'inline-block';
            btnText.style.display = 'none';

            try {
                const headers = { 
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                };

                if (tokenInput.value.trim()) {
                    headers['Authorization'] = `Bearer ${tokenInput.value.trim()}`;
                }

                const options = { method, headers };

                if (method !== 'GET' && bodyInput.value.trim()) {
                    options.body = bodyInput.value.trim();
                }

                const response = await fetch(fullUrl, options);

                if (response.ok) {
                    const data = await response.json();
                    
                    // Auto-store token logic
                    if (autoStore.checked && data.access) {
                        tokenInput.value = data.access;
                    }

                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<strong>Success!</strong> Status: ${response.status}<br><br>API Response: <pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.className = 'error';
                    const errorText = await response.text().catch(() => 'No response body');
                    resultDiv.innerHTML = `<strong>API Responded with Error</strong> Status: ${response.status}<br><br>${errorText.substring(0, 200)}...`;
                }
            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<strong>CORS or Network Error</strong><br><br>${err.message}<br><br>Ensure this origin is in your Railway CORS_ALLOWED_ORIGINS.`;
            } finally {
                loader.style.display = 'none';
                btnText.style.display = 'inline-block';
            }
        }
    </script>
</body>

</html>
