<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Entity Relationship Diagram</title>
    <style>
        body {
            font-family: 'Anthropic Sans', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #erd { 
            width: 100%; 
            max-width: 1200px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #erd svg { width: 100%; height: auto; }
        h1 { color: #26215c; }
        .back-link { margin-bottom: 20px; text-decoration: none; color: #534ab7; font-weight: bold; }
    </style>
</head>
<body>
    <a href="README.md" class="back-link">← Back to README</a>
    <h1>Entity Relationship Diagram</h1>
    <div id="erd"></div>
    <script type="module">
        import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
        const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        await document.fonts.ready;
        mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            fontFamily: '"Anthropic Sans", sans-serif',
            themeVariables: {
                darkMode: dark,
                fontSize: '13px',
                fontFamily: '"Anthropic Sans", sans-serif',
                lineColor: dark ? '#9c9a92' : '#73726c',
                textColor: dark ? '#c2c0b6' : '#3d3d3a',
                primaryColor: dark ? '#2a2a40' : '#eeedfe',
                primaryTextColor: dark ? '#c2c0b6' : '#26215c',
                primaryBorderColor: dark ? '#534ab7' : '#534ab7',
                secondaryColor: dark ? '#1e2d1e' : '#eaf3de',
                tertiaryColor: dark ? '#1a2a2a' : '#e1f5ee',
                background: dark ? '#1a1a1a' : '#ffffff',
                mainBkg: dark ? '#2a2a40' : '#eeedfe',
                nodeBorder: dark ? '#534ab7' : '#534ab7',
                clusterBkg: dark ? '#1e1e30' : '#f5f5ff',
                titleColor: dark ? '#c2c0b6' : '#26215c',
                edgeLabelBackground: dark ? '#1a1a1a' : '#ffffff',
                attributeBackgroundColorEven: dark ? '#222233' : '#f5f5ff',
                attributeBackgroundColorOdd: dark ? '#1e1e2e' : '#eeedfe',
            },
        });

        const diagram = `erDiagram
  User {
    uuid id PK
    string username UK
    string email UK
    string password_hash
    enum role
    text avatar_url
    text bio
    bool is_active
    bool email_verified
    timestamp last_login_at
    timestamp created_at
    timestamp updated_at
  }

  Category {
    uuid id PK
    string name UK
    string slug UK
    text description
    text icon_url
    uuid parent_id FK
    timestamp created_at
  }

  Tag {
    uuid id PK
    string name UK
    string slug UK
    timestamp created_at
  }

  Quiz {
    uuid id PK
    string title
    string topic
    text description
    uuid category_id FK
    uuid created_by FK
    enum difficulty
    enum status
    bool is_public
    float passing_score
    int time_limit
    bool shuffle_questions
    bool shuffle_options
    bool allow_skip
    int max_attempts
    text ai_prompt
    string ai_model_used
    timestamp published_at
    bool is_active
    timestamp created_at
    timestamp updated_at
  }

  QuizTag {
    uuid id PK
    uuid quiz_id FK
    uuid tag_id FK
  }

  Question {
    uuid id PK
    uuid quiz_id FK
    text text
    text explanation
    enum difficulty
    enum question_type
    int order_index
    int points
    text image_url
    timestamp created_at
  }

  Option {
    uuid id PK
    uuid question_id FK
    text text
    bool is_correct
    int order_index
    text image_url
  }

  Attempt {
    uuid id PK
    uuid user_id FK
    uuid quiz_id FK
    int attempt_number
    enum status
    float score
    bool is_passed
    timestamp started_at
    timestamp completed_at
    int time_taken
    bool is_reviewed
  }

  Answer {
    uuid id PK
    uuid attempt_id FK
    uuid question_id FK
    uuid selected_option_id FK
    bool is_skipped
    timestamp answered_at
  }

  QuizRating {
    uuid id PK
    uuid user_id FK
    uuid quiz_id FK
    smallint rating
    text review
    timestamp created_at
    timestamp updated_at
  }

  Follow {
    uuid id PK
    uuid follower_id FK
    uuid following_id FK
    timestamp created_at
  }

  Notification {
    uuid id PK
    uuid user_id FK
    string title
    text message
    enum type
    uuid reference_id
    string reference_type
    bool is_read
    timestamp created_at
  }

  Category ||--o{ Category : "parent"
  User ||--o{ Quiz : "creates"
  Category ||--o{ Quiz : "categorizes"
  Quiz ||--o{ QuizTag : "has"
  Tag ||--o{ QuizTag : "tagged in"
  Quiz ||--o{ Question : "contains"
  Question ||--o{ Option : "has"
  User ||--o{ Attempt : "makes"
  Quiz ||--o{ Attempt : "attempted in"
  Attempt ||--o{ Answer : "records"
  Question ||--o{ Answer : "answered by"
  Option ||--o{ Answer : "selected in"
  User ||--o{ QuizRating : "gives"
  Quiz ||--o{ QuizRating : "rated by"
  User ||--o{ Follow : "follows"
  User ||--o{ Notification : "receives"
`;

        try {
            const { svg } = await mermaid.render('erd-svg', diagram);
            document.getElementById('erd').innerHTML = svg;

            document.querySelectorAll('#erd svg .node').forEach(node => {
                const firstPath = node.querySelector('path[d]');
                if (!firstPath) return;
                const d = firstPath.getAttribute('d');
                const nums = d.match(/-?[\d.]+/g)?.map(Number);
                if (!nums || nums.length < 8) return;
                const xs = [nums[0], nums[2], nums[4], nums[6]];
                const ys = [nums[1], nums[3], nums[5], nums[7]];
                const x = Math.min(...xs), y = Math.min(...ys);
                const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x); rect.setAttribute('y', y);
                rect.setAttribute('width', w); rect.setAttribute('height', h);
                rect.setAttribute('rx', '8');
                for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
                    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
                }
                firstPath.replaceWith(rect);
            });

            document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
                p.setAttribute('stroke', 'none');
            });
        } catch (e) {
            console.error(e);
            document.getElementById('erd').innerHTML = '<p style="color:red">Failed to render diagram. Check console for details.</p>';
        }
    </script>
</body>
</html>
