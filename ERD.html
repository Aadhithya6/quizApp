<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Database Schema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-color: #6366f1;
            --border-color: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --accent-color: #818cf8;
                --border-color: #334155;
            }
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 800px;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-color), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        #erd { 
            width: 100%; 
            max-width: 1400px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow-x: auto;
        }

        #erd svg { 
            width: 100%; 
            height: auto; 
            min-width: 1000px;
        }

        .actions {
            margin-bottom: 30px;
            display: flex;
            gap: 16px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-outline {
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        /* Enhanced Visibility for Mermaid */
        #erd svg {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }
        
        #erd svg text {
            font-family: 'Inter', sans-serif !important;
            font-weight: 500 !important;
        }

        #erd svg .er.entityLabel {
            font-weight: 700 !important;
        }

        #erd svg .er.relationshipLabel {
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Database Schema</h1>
        <p>A comprehensive view of the Quiz Application's entities and their relationships.</p>
    </div>

    <div class="actions">
        <a href="README.md" class="btn btn-outline">← Back to README</a>
        <a href="API_DOCUMENTATION.md" class="btn btn-outline">API Documentation</a>
    </div>

    <div id="erd"></div>
    <script type="module">
        import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
        const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        mermaid.initialize({
            startOnLoad: false,
            theme: dark ? 'dark' : 'neutral',
            fontFamily: "'Inter', sans-serif",
            themeVariables: {
                primaryColor: '#6366f1',
                primaryTextColor: '#ffffff',
                primaryBorderColor: '#4f46e5',
                lineColor: '#6366f1',
                secondaryColor: '#818cf8',
                tertiaryColor: dark ? '#1e293b' : '#f8fafc',
            },
        });

        const diagram = `erDiagram
  User {
    uuid id PK
    string username UK
    string email UK
    string password_hash
    enum role
    text avatar_url
    text bio
    bool is_active
    bool email_verified
    timestamp last_login_at
    timestamp created_at
    timestamp updated_at
  }

  Category {
    uuid id PK
    string name UK
    string slug UK
    text description
    text icon_url
    uuid parent_id FK
    timestamp created_at
  }

  Tag {
    uuid id PK
    string name UK
    string slug UK
    timestamp created_at
  }

  Quiz {
    uuid id PK
    string title
    string topic
    text description
    uuid category_id FK
    uuid created_by FK
    enum difficulty
    enum status
    bool is_public
    float passing_score
    int time_limit
    bool shuffle_questions
    bool shuffle_options
    bool allow_skip
    int max_attempts
    text ai_prompt
    string ai_model_used
    timestamp published_at
    bool is_active
    timestamp created_at
    timestamp updated_at
  }

  QuizTag {
    uuid id PK
    uuid quiz_id FK
    uuid tag_id FK
  }

  Question {
    uuid id PK
    uuid quiz_id FK
    text text
    text explanation
    enum difficulty
    enum question_type
    int order_index
    int points
    text image_url
    timestamp created_at
  }

  Option {
    uuid id PK
    uuid question_id FK
    text text
    bool is_correct
    int order_index
    text image_url
  }

  Attempt {
    uuid id PK
    uuid user_id FK
    uuid quiz_id FK
    int attempt_number
    enum status
    float score
    bool is_passed
    timestamp started_at
    timestamp completed_at
    int time_taken
    bool is_reviewed
  }

  Answer {
    uuid id PK
    uuid attempt_id FK
    uuid question_id FK
    uuid selected_option_id FK
    bool is_skipped
    timestamp answered_at
  }

  QuizRating {
    uuid id PK
    uuid user_id FK
    uuid quiz_id FK
    smallint rating
    text review
    timestamp created_at
    timestamp updated_at
  }

  Follow {
    uuid id PK
    uuid follower_id FK
    uuid following_id FK
    timestamp created_at
  }

  Notification {
    uuid id PK
    uuid user_id FK
    string title
    text message
    enum type
    uuid reference_id
    string reference_type
    bool is_read
    timestamp created_at
  }

  Category ||--o{ Category : "parent"
  User ||--o{ Quiz : "creates"
  Category ||--o{ Quiz : "categorizes"
  Quiz ||--o{ QuizTag : "has"
  Tag ||--o{ QuizTag : "tagged in"
  Quiz ||--o{ Question : "contains"
  Question ||--o{ Option : "has"
  User ||--o{ Attempt : "makes"
  Quiz ||--o{ Attempt : "attempted in"
  Attempt ||--o{ Answer : "records"
  Question ||--o{ Answer : "answered by"
  Option ||--o{ Answer : "selected in"
  User ||--o{ QuizRating : "gives"
  Quiz ||--o{ QuizRating : "rated by"
  User ||--o{ Follow : "follows"
  User ||--o{ Notification : "receives"
`;

        try {
            const { svg } = await mermaid.render('erd-svg', diagram);
            document.getElementById('erd').innerHTML = svg;

            document.querySelectorAll('#erd svg .node').forEach(node => {
                const firstPath = node.querySelector('path[d]');
                if (!firstPath) return;
                const d = firstPath.getAttribute('d');
                const nums = d.match(/-?[\d.]+/g)?.map(Number);
                if (!nums || nums.length < 8) return;
                const xs = [nums[0], nums[2], nums[4], nums[6]];
                const ys = [nums[1], nums[3], nums[5], nums[7]];
                const x = Math.min(...xs), y = Math.min(...ys);
                const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x); rect.setAttribute('y', y);
                rect.setAttribute('width', w); rect.setAttribute('height', h);
                rect.setAttribute('rx', '8');
                for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
                    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
                }
                firstPath.replaceWith(rect);
            });

            document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
                p.setAttribute('stroke', 'none');
            });
        } catch (e) {
            console.error(e);
            document.getElementById('erd').innerHTML = '<p style="color:red">Failed to render diagram. Check console for details.</p>';
        }
    </script>
</body>
</html>
